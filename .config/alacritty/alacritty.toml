[env]
term = "xterm-256color"
live_config_reload = "true"

[window]
decorations = "none"
dynamic_padding = true
opacity = 0.98

[window.dimensions]
columns = 0
lines = 0

[window.padding]
x = 8
y = 8

[colors.primary]
background = "0x22272e"
foreground = "0xadbac7"

[colors.normal]
black = "0x545d68"
red = "0xf47067"
green = "0x57ab5a"
yellow = "0xc69026"
blue = "0x539bf5"
magenta = "0xb083f0"
cyan = "0x39c5cf"
white = "0x909dab"

[colors.bright]
black = "0x636e7b"
red = "0xff938a"
green = "0x6bc46d"
yellow = "0xdaaa3f"
blue = "0x6cb6ff"
magenta = "0xb083f0"
cyan = "0x39c5cf"
white = "0x909dab"

[font]
size = 12.0

[font.normal]
family = "Fira Code"
style = "Regular"

